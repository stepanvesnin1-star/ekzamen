<h1>Войти в аккаунт</h1>

<div class="container">
    <form>
    <div class="mb-3">
            <label for="exampleInputLogin" class="form-label">Логин</label>
            <input type="login" class="form-control" id="exampleInputLogin" aria-describedby="login" pattern="^[a-zA-Z]{6,}" title="Разрешены только латинские буквы, минимум 6 сиволов">
    <span>Введите логин указанный при регистрации</span>
  </div>

  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Пароль</label>
    <input type="password" class="form-control" id="exampleInputPassword1" pattern="^[a-zA-Z]{8,}" title="минимум 8 сиволов">
  </div>

  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="exampleCheck1">
    <label class="form-check-label" for="exampleCheck1">Запомнить меня</label>
  </div>

  <button type="submit" class="btn btn-primary">Войти</button>
</form>
